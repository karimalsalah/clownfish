name: publish cluster results

on:
  workflow_run:
    workflows:
      - cluster worker
    types:
      - completed

permissions:
  contents: write
  actions: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: projectclownfish-publish-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download worker artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          rm -rf artifacts
          npm run backfill-results -- \
            --repo "$GITHUB_REPOSITORY" \
            --workflow cluster-worker.yml \
            --run-id "$RUN_ID" \
            --run-attempt "${RUN_ATTEMPT:-1}" \
            --conclusion any \
            --limit "${CLOWNFISH_PUBLISH_BACKFILL_LIMIT:-50}" \
            --lookback "${CLOWNFISH_PUBLISH_BACKFILL_LOOKBACK:-500}" \
            --out artifacts \
            --runs-json artifacts/runs.json
          npm run review-results -- artifacts

      - name: Publish and commit result ledger
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main
          npm run publish-result -- artifacts --runs-json artifacts/runs.json
          npm run finalize-open-prs -- --write-report
          npm run publish-result
          git add README.md results jobs/openclaw/closed apply-report.json
          if git diff --cached --quiet; then
            echo "No result changes"
            exit 0
          fi
          git commit -m "chore: publish cluster result"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing existing ledger commit onto origin/main"
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            git rebase --abort || true
            exit 1
          done
          exit 1
